---
layout: default
---

<article id="post">
    <div class="container">
        <div class="col-lg-8">
            <h2>{{ page.title }}</h2>

            <p class="lead">
                by {% if page.author %} • {{ page.author }} {% endif %}
                • posted on {{ page.date | date: "%b %-d, %Y" }}
                {% if page.meta %} • {{ page.meta }}{% endif %}

            </p>



        </div>


    </div>

</article>


{{ page.content }}
